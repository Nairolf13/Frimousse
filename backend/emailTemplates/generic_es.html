<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>{{title}}</title>
</head>
<body style="margin:0;padding:0;background:#f1f5f9;font-family:Inter,system-ui,-apple-system,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;color:#1f2937;">
  <table width="100%" cellpadding="0" cellspacing="0" style="background:#f1f5f9;padding:32px 16px;">
    <tr><td align="center">
      <table width="100%" cellpadding="0" cellspacing="0" style="max-width:600px;">

        <!-- Header -->
        <tr><td style="background:linear-gradient(135deg,#0b5566 0%,#08323a 100%);border-radius:16px 16px 0 0;padding:32px 32px 24px;text-align:center;">
          <img src="https://lesfrimousses.com/imgs/FrimousseLogo.webp" alt="Frimousse" width="64" style="display:block;margin:0 auto 16px;border-radius:12px;" />
          <h1 style="margin:0;font-size:22px;font-weight:700;color:#ffffff;letter-spacing:-0.3px;">{{title}}</h1>
        </td></tr>

        <!-- Body -->
        <tr><td style="background:#ffffff;padding:32px;font-size:15px;color:#374151;line-height:1.6;">
          {{{content}}}
        </td></tr>

        <!-- Footer -->
        <tr><td style="background:#f8fafc;border-top:1px solid #e2e8f0;border-radius:0 0 16px 16px;padding:20px 32px;text-align:center;">
          <p style="margin:0 0 4px;font-size:13px;color:#6b7280;">Les Frimousses — Guardería</p>
          <p style="margin:0;font-size:12px;color:#9ca3af;">Este correo ha sido enviado automáticamente, por favor no respondas.</p>
        </td></tr>

      </table>
    </td></tr>
  </table>
</body>
</html>

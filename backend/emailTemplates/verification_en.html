<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Verify your email</title>
</head>
<body style="margin:0;padding:0;background:#f1f5f9;font-family:Inter,system-ui,-apple-system,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;color:#1f2937;">
  <table width="100%" cellpadding="0" cellspacing="0" style="background:#f1f5f9;padding:32px 16px;">
    <tr><td align="center">
      <table width="100%" cellpadding="0" cellspacing="0" style="max-width:600px;">

        <!-- Header -->
        <tr><td style="background:linear-gradient(135deg,#0b5566 0%,#08323a 100%);border-radius:16px 16px 0 0;padding:32px 32px 24px;text-align:center;">
          <img src="{{logoUrl}}" alt="Frimousse" width="64" style="display:block;margin:0 auto 16px;border-radius:12px;" />
          <h1 style="margin:0;font-size:22px;font-weight:700;color:#ffffff;letter-spacing:-0.3px;">Verify your email</h1>
          <p style="margin:8px 0 0;font-size:14px;color:rgba(255,255,255,0.75);">Use the code below to activate your account.</p>
        </td></tr>

        <!-- Body -->
        <tr><td style="background:#ffffff;padding:32px;text-align:center;">
          <p style="margin:0 0 8px;font-size:15px;color:#374151;">Hello <strong style="color:#0b5566;">{{name}}</strong>,</p>
          <p style="margin:0 0 28px;font-size:15px;color:#374151;line-height:1.6;">Thank you for signing up for Frimousse. Here is your verification code:</p>

          <!-- Code block -->
          <table width="100%" cellpadding="0" cellspacing="0" style="margin-bottom:24px;">
            <tr><td align="center">
              <div style="display:inline-block;background:#f0fdf4;border:2px dashed #0b5566;border-radius:14px;padding:20px 40px;">
                <span style="font-size:40px;font-weight:700;letter-spacing:10px;color:#0b5566;font-family:monospace;">{{code}}</span>
              </div>
            </td></tr>
          </table>

          <p style="margin:0 0 24px;font-size:14px;color:#6b7280;">This code expires in <strong style="color:#0f172a;">15 minutes</strong>.</p>
          <p style="margin:0;font-size:13px;color:#9ca3af;">If you didn't create this account, you can ignore this email.</p>
        </td></tr>

        <!-- Footer -->
        <tr><td style="background:#f8fafc;border-top:1px solid #e2e8f0;border-radius:0 0 16px 16px;padding:20px 32px;text-align:center;">
          <p style="margin:0;font-size:13px;color:#6b7280;">© Frimousse — <strong style="color:#0b5566;">The Frimousse team</strong></p>
        </td></tr>

      </table>
    </td></tr>
  </table>
</body>
</html>
